<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif
        }

        body {
            font-size: 2em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    

    <script>
        var nome = window.prompt("qual o seu nome?")
        document.write(`Olá ${nome} seu nome tem ${nome.length} letras <br/>` )
        document.write(`O seu nome em maisculo é assim ${nome.toUpperCase()} <br/>`)
        document.write(`O seu nome em minusculo é assim ${nome.toLocaleLowerCase()}`)
    </script>
</body>
</html>
